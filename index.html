<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Velocity: Overdrive</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #050508;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            overflow: hidden;
        }
        .orbitron {
            font-family: 'Orbitron', sans-serif;
        }
        .shift-gate {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
        /* Prevents mobile selection highlights */
        -webkit-tap-highlight-color: transparent;
    </style>
</head>
<body class="w-screen h-screen relative select-none overflow-hidden">

    <!-- CINEMATIC INTRO SCREEN -->
    <div id="introScreen" class="absolute inset-0 z-50 bg-slate-950 flex flex-col items-center justify-center p-6 text-center">
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,rgba(30,41,59,0.3)_0%,transparent_70%)]"></div>
        
        <div class="z-10 max-w-xl w-full flex flex-col items-center">
            <div class="flex items-center gap-2 px-4 py-1.5 bg-red-500/10 border border-red-500/30 rounded-full text-red-400 text-xs font-bold tracking-widest orbitron uppercase mb-4 dynamic-pulse">
                <i data-lucide="gauge" class="w-4 h-4"></i> Mobile Engine Active
            </div>
            
            <h1 class="orbitron text-4xl md:text-7xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-white via-slate-200 to-slate-500 drop-shadow-xl">
                APEX VELOCITY
            </h1>
            <h2 class="orbitron text-lg md:text-2xl font-bold tracking-widest text-blue-500 mb-6 italic">
                OVERDRIVE // RACING SIM
            </h2>

            <!-- Setup Selector Blocks -->
            <div class="grid grid-cols-2 gap-4 w-full mb-6">
                <button id="trackStyleBtn" class="bg-slate-900/90 border border-slate-800 rounded-xl p-3 text-left transition-all">
                    <span class="block text-slate-500 text-[10px] font-bold uppercase tracking-wider mb-1">Terrain</span>
                    <span id="trackLabel" class="orbitron text-sm font-bold text-white flex items-center gap-2">
                        <i data-lucide="circuit-board" class="w-4 h-4 text-blue-500"></i> PRO CIRCUIT
                    </span>
                </button>

                <button id="cameraStyleBtn" class="bg-slate-900/90 border border-slate-800 rounded-xl p-3 text-left transition-all">
                    <span class="block text-slate-500 text-[10px] font-bold uppercase tracking-wider mb-1">Perspective</span>
                    <span id="cameraLabel" class="orbitron text-sm font-bold text-white flex items-center gap-2">
                        <i data-lucide="video" class="w-4 h-4 text-red-500"></i> COCKPIT VIEW
                    </span>
                </button>
            </div>

            <!-- Launch Button -->
            <button id="startRaceBtn" class="orbitron w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-extrabold text-xl rounded-xl shadow-lg flex items-center justify-center gap-3">
                TAP TO START ENGINE <i data-lucide="play" class="fill-current w-5 h-5"></i>
            </button>
        </div>
    </div>

    <!-- MAIN DASHBOARD ACTION HUD -->
    <div id="gameHUD" class="hidden absolute top-3 left-3 right-3 z-20 pointer-events-none flex justify-between items-start">
        <!-- Telemetry Data Dial -->
        <div class="bg-slate-950/85 border border-slate-800 px-3 py-2 rounded-xl flex items-center gap-4 pointer-events-auto shadow-2xl">
            <div>
                <span class="text-slate-500 text-[10px] font-bold uppercase block tracking-wider">SPEED</span>
                <div class="flex items-baseline">
                    <span id="hudSpeed" class="orbitron text-2xl font-black text-white">0</span>
                    <span class="text-slate-400 font-bold text-[10px] ml-0.5">KM/H</span>
                </div>
            </div>
            <div class="h-6 w-px bg-slate-800"></div>
            <div>
                <span class="text-slate-500 text-[10px] font-bold uppercase block tracking-wider">GEAR</span>
                <span id="hudGear" class="orbitron text-xl font-black text-blue-400 text-center block">N</span>
            </div>
            <div class="h-6 w-px bg-slate-800"></div>
            <div>
                <span class="text-slate-500 text-[10px] font-bold uppercase block tracking-wider">RPM</span>
                <div class="w-20 bg-slate-800 h-2 rounded-full overflow-hidden mt-1">
                    <div id="rpmBar" class="bg-gradient-to-r from-blue-500 via-yellow-500 to-red-500 h-full" style="width: 10%"></div>
                </div>
            </div>
        </div>

        <!-- Camera Perspective Controls -->
        <div class="flex flex-col gap-1.5 pointer-events-auto">
            <button id="toggleCamBtn" class="bg-slate-950/90 border border-slate-800 p-2.5 rounded-xl text-white flex items-center gap-1.5 text-xs font-bold shadow-lg">
                <i data-lucide="camera" class="w-4 h-4 text-red-500"></i> CAM
            </button>
            <button id="resetCarBtn" class="bg-slate-950/90 border border-slate-800 p-1.5 rounded-xl text-slate-400 text-[10px] font-bold text-center">
                RESET
            </button>
        </div>
    </div>

    <!-- TOUCH CONTROLS DECK OVERLAY -->
    <div id="controlsDashboard" class="hidden absolute bottom-4 left-4 right-4 z-30 pointer-events-none flex justify-between items-end">
        
        <!-- LEFT SIDE: STEERING INTERFACE -->
        <div class="flex flex-col items-center gap-2 pointer-events-auto">
            <div class="flex items-center gap-2">
                <!-- Touch Steering Buttons right next to the wheel for clean mobile ergonomics -->
                <button id="btnLeft" class="w-14 h-14 bg-slate-900/90 border-2 border-slate-700 active:border-blue-500 rounded-xl flex items-center justify-center text-white font-bold text-2xl shadow-xl select-none"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
                
                <div id="steeringWheel" class="w-24 h-24 rounded-full border-8 border-slate-900 bg-transparent flex items-center justify-center relative shadow-2xl transition-transform duration-75 ease-out">
                    <div class="w-full h-2 bg-slate-800 absolute"></div>
                    <div class="w-2 h-full bg-slate-800 absolute top-1/2 -translate-y-1/2"></div>
                    <div class="absolute top-0 w-3 h-2 bg-red-600 rounded-sm"></div>
                </div>

                <button id="btnRight" class="w-14 h-14 bg-slate-900/90 border-2 border-slate-700 active:border-blue-500 rounded-xl flex items-center justify-center text-white font-bold text-2xl shadow-xl select-none"><i data-lucide="arrow-right" class="w-6 h-6"></i></button>
            </div>
        </div>

        <!-- CENTER CORNER RIGHT: PEDALS ENGINE ACCELERATOR -->
        <div class="flex gap-3 pointer-events-auto items-end">
            <!-- Brake/Reverse Pedal -->
            <button id="btnBrake" class="w-16 h-24 bg-gradient-to-b from-slate-800 to-slate-950 border-t-4 border-red-500 rounded-t-lg shadow-2xl flex flex-col justify-between items-center py-2 text-[10px] font-black tracking-widest text-slate-400 active:from-red-950 active:to-slate-950 select-none">
                <div class="w-8 h-1 bg-slate-700 rounded"></div>
                BRAKE
            </button>
            <!-- Accelerator/Gas Pedal -->
            <button id="btnGas" class="w-16 h-28 bg-gradient-to-b from-slate-800 to-slate-950 border-t-4 border-emerald-500 rounded-t-lg shadow-2xl flex flex-col justify-between items-center py-2 text-[10px] font-black tracking-widest text-slate-400 active:from-emerald-950 active:to-slate-950 select-none">
                <div class="w-8 h-1 bg-slate-700 rounded"></div>
                GAS
            </button>
        </div>

        <!-- EXTREME RIGHT: MANUAL GATE SHIFTER BOX ASSEMBLY -->
        <div class="pointer-events-auto flex flex-col items-center">
            <div class="w-28 h-36 rounded-xl border border-slate-800 shift-gate p-2 relative shadow-2xl">
                <div class="grid grid-cols-3 gap-1 w-full h-full relative z-10">
                    <button id="shift1" class="rounded-lg text-xs font-bold font-mono text-slate-400 bg-slate-950/40 flex items-center justify-center">1</button>
                    <button id="shift2" class="rounded-lg text-xs font-bold font-mono text-slate-400 bg-slate-950/40 flex items-center justify-center">2</button>
                    <button id="shift4" class="rounded-lg text-xs font-bold font-mono text-slate-400 bg-slate-950/40 flex items-center justify-center">4</button>
                    <button id="shiftR" class="rounded-lg text-xs font-bold font-mono text-red-500 bg-slate-950/40 flex items-center justify-center">R</button>
                    <button id="shift3" class="rounded-lg text-xs font-bold font-mono text-slate-400 bg-slate-950/40 flex items-center justify-center">3</button>
                    <button id="shift0" class="rounded-lg text-xs font-bold font-mono text-blue-400 bg-blue-500/20 border border-blue-500/40 flex items-center justify-center">N</button>
                </div>
            </div>
        </div>

    </div>

    <!-- CANVAS RENDERING TARGET -->
    <div id="canvasViewport" class="w-full h-full block"></div>

    <script>
        // Global Simulation Configuration Variables
        const config = {
            trackType: 'circuit',
            cameraMode: 'cockpit',
            maxGears: 4,
            gearMultipliers: { '-1': -25, '0': 0, '1': 45, '2': 85, '3': 140, '4': 220 }
        };

        const carState = {
            x: 0, z: 0, speed: 0, targetSpeed: 0, heading: 0,
            steeringAngle: 0, targetSteeringAngle: 0, gear: 0, rpm: 1000
        };

        const inputs = { forward: false, backward: false, left: false, right: false };

        // UI Target DOM Hooks
        const introScreen = document.getElementById('introScreen');
        const gameHUD = document.getElementById('gameHUD');
        const controlsDashboard = document.getElementById('controlsDashboard');
        const trackStyleBtn = document.getElementById('trackStyleBtn');
        const trackLabel = document.getElementById('trackLabel');
        const cameraStyleBtn = document.getElementById('cameraStyleBtn');
        const cameraLabel = document.getElementById('cameraLabel');
        const startRaceBtn = document.getElementById('startRaceBtn');
        const toggleCamBtn = document.getElementById('toggleCamBtn');
        const resetCarBtn = document.getElementById('resetCarBtn');
        const steeringWheel = document.getElementById('steeringWheel');

        let scene, camera, renderer, pCar, exhaustLeft, exhaustRight;
        let oppositionCars = [], flameParticles = [], decorationElements = [];
        let clock = new THREE.Clock();

        // Environment Setup Configuration Selectors
        trackStyleBtn.addEventListener('click', () => {
            config.trackType = config.trackType === 'circuit' ? 'offroad' : 'circuit';
            trackLabel.innerHTML = config.trackType === 'circuit' ? 
                `<i data-lucide="circuit-board" class="w-4 h-4 text-blue-500"></i> PRO CIRCUIT` : 
                `<i data-lucide="mountain" class="w-4 h-4 text-amber-600"></i> OFF-ROAD`;
            lucide.createIcons();
        });

        cameraStyleBtn.addEventListener('click', () => {
            config.cameraMode = config.cameraMode === 'cockpit' ? 'chase' : 'cockpit';
            cameraLabel.innerHTML = config.cameraMode === 'cockpit' ? 
                `<i data-lucide="video" class="w-4 h-4 text-red-500"></i> COCKPIT` : 
                `<i data-lucide="eye" class="w-4 h-4 text-blue-500"></i> 3RD PERSON`;
            lucide.createIcons();
        });

        startRaceBtn.addEventListener('click', () => {
            introScreen.classList.add('hidden');
            gameHUD.classList.remove('hidden');
            controlsDashboard.classList.remove('hidden');
            initEngineSimulator();
        });

        // Interactive Mechanical Gear Selection System Logic
        function setGear(targetGearValue) {
            carState.gear = targetGearValue;
            ['-1', '0', '1', '2', '3', '4'].forEach(g => {
                const btn = document.getElementById('shift' + (g === '-1' ? 'R' : g));
                if (btn) btn.className = "rounded-lg text-xs font-bold font-mono text-slate-400 bg-slate-950/40 flex items-center justify-center";
            });
            const activeBtn = document.getElementById('shift' + (targetGearValue === -1 ? 'R' : targetGearValue));
            if (activeBtn) {
                activeBtn.className = targetGearValue === 0 ? 
                    "rounded-lg text-xs font-bold font-mono text-blue-400 bg-blue-500/20 border border-blue-500/40 flex items-center justify-center" :
                    "rounded-lg text-xs font-bold font-mono text-emerald-400 bg-emerald-500/20 border border-emerald-500/40 flex items-center justify-center";
            }
            triggerBackfirePlume(4);
        }

        // Setup Event Shifter Shunt Mapping Elements
        ['-1', '0', '1', '2', '3', '4'].forEach(g => {
            const el = document.getElementById('shift' + (g === '-1' ? 'R' : g));
            el.addEventListener('touchstart', (e) => { e.preventDefault(); setGear(parseInt(g)); });
            el.addEventListener('click', () => setGear(parseInt(g)));
        });

        // Initialize WebGL Graphics Canvas Frame
        function initEngineSimulator() {
            const container = document.getElementById('canvasViewport');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(config.trackType === 'circuit' ? 0x0a1128 : 0x1a1612);
            scene.fog = new THREE.FogExp2(scene.background, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // Optimized for mobile processing
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            buildSimulatorWorld();
            buildPlayerVehicle();
            buildCompetitors();
            setupTouchInputListeners();

            window.addEventListener('resize', onWindowResize, false);
            animateFrame();
        }

        function buildPlayerVehicle() {
            pCar = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: config.trackType === 'circuit' ? 0x2563eb : 0xd97706, roughness: 0.2 });
            
            const base = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.3, 3.8), bodyMat);
            base.position.y = 0.25;
            pCar.add(base);

            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.5, 1.5), new THREE.MeshStandardMaterial({ color: 0x111827 }));
            cabin.position.set(0, 0.6, 0.2);
            pCar.add(cabin);

            // Exhaust Arrays
            const exGeom = new THREE.CylinderGeometry(0.07, 0.07, 0.3, 8); exGeom.rotateX(Math.PI/2);
            const exMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
            exhaustLeft = new THREE.Mesh(exGeom, exMat); exhaustLeft.position.set(-0.4, 0.2, -1.9);
            exhaustRight = exhaustLeft.clone(); exhaustRight.position.x = 0.4;
            pCar.add(exhaustLeft, exhaustRight);

            scene.add(pCar);
        }

        function buildCompetitors() {
            const colors = [0xef4444, 0x10b981, 0x8b5cf6];
            for(let i=0; i<3; i++) {
                const bot = new THREE.Group();
                const base = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.3, 3.8), new THREE.MeshStandardMaterial({ color: colors[i] }));
                base.position.y = 0.25; bot.add(base);
                bot.position.set((i - 1) * 5, 0, -30 - (i * 15));
                scene.add(bot);
                oppositionCars.push({ mesh: bot, speed: 20 + i * 3, progress: i * 0.25, offset: (i - 1) * 3 });
            }
        }

        function buildSimulatorWorld() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: config.trackType === 'circuit' ? 0x064e3b : 0x3b2314 }));
            ground.rotation.x = -Math.PI / 2; scene.add(ground);

            const pts = [
                new THREE.Vector3(0,0,0), new THREE.Vector3(40,0,-60), new THREE.Vector3(120,0,-100),
                new THREE.Vector3(180,0,-30), new THREE.Vector3(140,0,60), new THREE.Vector3(60,0,120),
                new THREE.Vector3(-60,0,80), new THREE.Vector3(-100,0,10)
            ];
            const spline = new THREE.CatmullRomCurve3(pts, true);
            const trackGeom = new THREE.TubeGeometry(spline, 64, 7, 4, true);
            const roadMat = new THREE.MeshStandardMaterial({ color: config.trackType === 'circuit' ? 0x1e293b : 0x5c3a21 });
            const road = new THREE.Mesh(trackGeom, roadMat);
            road.scale.set(1, 0.01, 1);
            scene.add(road);
        }

        // MULTI-TOUCH MOBILE GRAPHICS CONTROLS MAPPING INTERFACE
        function setupTouchInputListeners() {
            const bindTouch = (id, key) => {
                const el = document.getElementById(id);
                el.addEventListener('touchstart', (e) => { e.preventDefault(); inputs[key] = true; });
                el.addEventListener('touchend', (e) => { e.preventDefault(); inputs[key] = false; });
            };
            
            bindTouch('btnLeft', 'left');
            bindTouch('btnRight', 'right');
            bindTouch('btnGas', 'forward');
            bindTouch('btnBrake', 'backward');

            // Generic fallback layout desktop arrow mapping keys
            window.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW' || e.code === 'ArrowUp') inputs.forward = true;
                if(e.code === 'KeyS' || e.code === 'ArrowDown') inputs.backward = true;
                if(e.code === 'KeyA' || e.code === 'ArrowLeft') inputs.left = true;
                if(e.code === 'KeyD' || e.code === 'ArrowRight') inputs.right = true;
            });
            window.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW' || e.code === 'ArrowUp') inputs.forward = false;
                if(e.code === 'KeyS' || e.code === 'ArrowDown') inputs.backward = false;
                if(e.code === 'KeyA' || e.code === 'ArrowLeft') inputs.left = false;
                if(e.code === 'KeyD' || e.code === 'ArrowRight') inputs.right = false;
            });

            toggleCamBtn.addEventListener('click', () => { config.cameraMode = config.cameraMode === 'cockpit' ? 'chase' : 'cockpit'; });
            resetCarBtn.addEventListener('click', () => { carState.x = 0; carState.z = 0; car
